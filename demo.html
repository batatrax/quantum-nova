<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Démo — calc + panneau annexe</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #f4f5f7;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .row {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }
        .calc-box   { width: 400px; height: 1000px; }
        .panel-box  { flex: 1; min-width: 480px; height: 1000px; }
        .calc-box iframe,
        .panel-box iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
    </style>
</head>
<body>
    <div class="row">
        <div class="calc-box">
            <iframe src="index.html" sandbox="allow-scripts allow-same-origin allow-popups allow-downloads"></iframe>
        </div>
        <div class="panel-box">
            <iframe src="panel.html" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
    </div>
</body>
</html>
