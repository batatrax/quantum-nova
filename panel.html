<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM-NOVA — Panneau annexe</title>

    <!-- Panneau annexe à embarquer en iframe à côté de la calculatrice.
         Affiche par défaut "Premiers pas". Reçoit via BroadcastChannel
         des messages depuis la calc :
           { type: 'show-help', section: '<id>' }
         et change son contenu en conséquence. -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="modes/matrix/matrix.css">

    <!-- KaTeX (rendu LaTeX) + math.js (det/inv/add/multiply) — pour le mode Matrices. -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
          integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV"
          crossorigin="anonymous">
    <script defer
            src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
            integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8"
            crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js" defer></script>

    <style>
        body {
            margin: 0;
            background: var(--screen-bg, #07090f);
            color: var(--text-main, #c0caf5);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
        }

        .panel-content {
            padding: 28px 36px;
            font-size: 0.9rem;
            line-height: 1.7;
            max-width: 900px;
            margin: 0 auto;
        }

        .panel-content h2 {
            color: var(--text-neon, #7aa2f7);
            letter-spacing: 2px;
            font-size: 1.2rem;
            margin: 0 0 14px;
            border-bottom: 1px solid var(--screen-border, #252840);
            padding-bottom: 8px;
        }

        .panel-content h3 {
            color: var(--text-main, #c0caf5);
            margin-top: 24px;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .panel-content p {
            color: var(--text-main, #c0caf5);
            opacity: 0.92;
        }

        .panel-content code {
            background: rgba(122, 162, 247, 0.12);
            color: var(--text-neon, #7aa2f7);
            padding: 2px 7px;
            border-radius: 3px;
            font-size: 0.82rem;
        }

        .panel-content .help-todo {
            background: rgba(224, 175, 104, 0.08);
            border-left: 3px solid var(--text-warn, #e0af68);
            padding: 10px 14px;
            border-radius: 4px;
            margin: 16px 0;
            color: var(--text-warn, #e0af68);
            font-size: 0.78rem;
            font-style: italic;
        }


        /* === Aide graphique : catalogue visuel sur la page de droite === */
        .graph-ref-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 10px;
            margin: 14px 0 22px;
        }
        .graph-ref-card {
            border: 1px solid var(--screen-border, #252840);
            background: rgba(122, 162, 247, 0.07);
            border-radius: 8px;
            padding: 11px 12px;
        }
        .graph-ref-card strong {
            display: block;
            color: var(--text-main, #c0caf5);
            font-size: 0.78rem;
            letter-spacing: 0.8px;
            margin-bottom: 7px;
        }
        .graph-ref-card code {
            display: inline-block;
            margin-bottom: 7px;
        }
        .graph-ref-card span {
            display: block;
            color: var(--text-dim, #565f89);
            font-size: 0.72rem;
            line-height: 1.5;
        }
        .graph-function-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px 14px;
            margin: 12px 0 22px;
        }
        .graph-function-list section,
        .graph-tool-list,
        .graph-example-stack {
            background: var(--key-num-bg, rgba(20, 22, 42, 0.5));
            border: 1px solid var(--screen-border, #252840);
            border-radius: 8px;
            padding: 10px 12px;
        }
        .graph-function-list h4 {
            margin: 0 0 8px;
            color: var(--text-neon, #7aa2f7);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1.4px;
        }
        .graph-function-list p,
        .graph-tool-list p,
        .graph-example-stack p {
            margin: 6px 0;
        }
        .graph-function-list code,
        .graph-example-stack code {
            margin: 2px 3px 2px 0;
            white-space: nowrap;
        }

        /* === Vue EXPORT === */
        .export-section {
            margin: 18px 0;
            padding: 12px 14px;
            background: var(--key-num-bg, rgba(20, 22, 42, 0.5));
            border: 1px solid var(--screen-border, #252840);
            border-radius: 6px;
        }
        .export-legend {
            font-size: 0.6rem;
            letter-spacing: 1.5px;
            color: var(--text-dim, #565f89);
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .export-option {
            display: block;
            padding: 6px 4px;
            color: var(--text-main, #c0caf5);
            font-size: 0.85rem;
            cursor: pointer;
        }
        .export-option input { margin-right: 6px; cursor: pointer; }
        .export-option input:disabled + * { opacity: 0.5; }

        .export-actions {
            display: flex;
            justify-content: flex-end;
            margin: 16px 0;
        }
        .export-download {
            background: var(--text-neon, #7aa2f7);
            color: var(--screen-bg, #07090f);
            border: none;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 10px 22px;
            cursor: pointer;
            transition: filter 0.15s ease;
        }
        .export-download:hover { filter: brightness(1.1); }

        .export-preview {
            background: var(--screen-bg, #07090f);
            border: 1px dashed var(--screen-border, #252840);
            border-radius: 6px;
            padding: 16px;
            min-height: 120px;
            max-height: 360px;
            overflow: auto;
        }
        .export-preview-text {
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            color: var(--text-main, #c0caf5);
            white-space: pre-wrap;
        }
        .export-preview img {
            display: block;
            max-width: 100%;
            height: auto;
            border: 1px solid var(--screen-border, #252840);
            border-radius: 4px;
        }
    </style>

    <!-- Sections d'aide (chacune s'auto-enregistre dans window.QNHelp) -->
    <script src="docs/sections/start.js" defer></script>
    <script src="modes/calc/03_doc_calc.js" defer></script>
    <script src="modes/graph/03_doc_graph.js" defer></script>
    <script src="modes/graph/04_examples_graph.js" defer></script>
    <script src="modes/scientific/03_doc_scientific.js" defer></script>
    <script src="modes/scientific/04_examples_scientific.js" defer></script>
    <script src="modes/matrix/03_doc_matrix.js" defer></script>
    <script src="modes/matrix/04_examples_matrix.js" defer></script>
    <script src="modes/matrix/05_panel_matrix.js" defer></script>
    <script src="modes/stats/03_doc_stats.js" defer></script>
    <script src="modes/stats/04_examples_stats.js" defer></script>
    <script src="docs/sections/shortcuts.js" defer></script>
</head>
<body>
    <article class="panel-content" id="panelContent">
        <h2>Chargement…</h2>
    </article>

    <script>
    (function () {
        'use strict';

        function parseFragment(html) {
            const range = document.createRange();
            return range.createContextualFragment(html);
        }

        function showSection(id) {
            const reg = window.QNHelp || {};
            const sec = reg[id];
            const content = document.getElementById('panelContent');
            if (!content || !sec) return;
            content.replaceChildren();
            content.appendChild(parseFragment(sec.html));
            content.scrollTop = 0;
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Page d'accueil par défaut : "Premiers pas"
            showSection('start');
        });

        // Écoute de la calc principale via BroadcastChannel
        try {
            const chan = new BroadcastChannel('quantum-nova');
            chan.onmessage = (ev) => {
                const msg = ev.data || {};
                if (msg.type === 'show-help' && msg.section) {
                    showSection(msg.section);
                }
                if (msg.type === 'theme-change' && msg.theme) {
                    document.documentElement.setAttribute('data-theme', msg.theme);
                }
                if (msg.type === 'show-export' && msg.data) {
                    showExportView(msg.data);
                }
            };
        } catch (e) { /* navigateur ne supporte pas BroadcastChannel */ }

        /* ----------------------------------------------------------------
           VUE EXPORT — déclenchée par le bouton 📤 EXPORT de la calc.
           Reçoit { mode, expression, history, canvasPng, ts }.
           ---------------------------------------------------------------- */
        function showExportView(data) {
            const content = document.getElementById('panelContent');
            if (!content) return;
            content.replaceChildren();

            const h2 = document.createElement('h2');
            h2.textContent = 'Export';
            content.appendChild(h2);

            // Que veux-tu exporter ?
            const sectContent = section('Que veux-tu exporter ?');
            const cbHistory = checkbox('opt-history', 'Historique des calculs', !!(data.history && data.history.length));
            const cbExpr    = checkbox('opt-expr',    'Saisie courante',         !!data.expression);
            const cbCanvas  = checkbox('opt-canvas',  'Graphique',               !!data.canvasPng);
            sectContent.appendChild(cbHistory);
            sectContent.appendChild(cbExpr);
            sectContent.appendChild(cbCanvas);
            content.appendChild(sectContent);

            // Format
            const sectFormat = section('Format');
            sectFormat.appendChild(radio('export-fmt', 'fmt-txt',   'Texte (.txt)',                 'txt',   true));
            sectFormat.appendChild(radio('export-fmt', 'fmt-png',   'Image PNG',                    'png',   false));
            sectFormat.appendChild(radio('export-fmt', 'fmt-print', 'PDF (impression navigateur)',  'print', false));
            content.appendChild(sectFormat);

            // Action télécharger
            const actions = document.createElement('div');
            actions.className = 'export-actions';
            const dl = document.createElement('button');
            dl.type = 'button';
            dl.className = 'export-download';
            dl.textContent = '⤓  Télécharger';
            dl.addEventListener('click', () => doDownload(data, gatherChoices(content)));
            actions.appendChild(dl);
            content.appendChild(actions);

            // Aperçu
            const sectPreview = section('Aperçu avant export');
            const previewBox = document.createElement('div');
            previewBox.className = 'export-preview';
            previewBox.id = 'exportPreview';
            sectPreview.appendChild(previewBox);
            content.appendChild(sectPreview);

            content.addEventListener('change', () => renderPreview(data, gatherChoices(content)));
            renderPreview(data, gatherChoices(content));
        }

        function section(legend) {
            const s = document.createElement('section');
            s.className = 'export-section';
            const l = document.createElement('div');
            l.className = 'export-legend';
            l.textContent = legend;
            s.appendChild(l);
            return s;
        }

        function checkbox(id, label, checked) {
            const lbl = document.createElement('label');
            lbl.className = 'export-option';
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.id = id;
            cb.checked = !!checked;
            cb.disabled = !checked;
            lbl.appendChild(cb);
            lbl.appendChild(document.createTextNode(' ' + label));
            return lbl;
        }

        function radio(name, id, label, value, checked) {
            const lbl = document.createElement('label');
            lbl.className = 'export-option';
            const r = document.createElement('input');
            r.type = 'radio';
            r.name = name;
            r.id = id;
            r.value = value;
            r.checked = !!checked;
            lbl.appendChild(r);
            lbl.appendChild(document.createTextNode(' ' + label));
            return lbl;
        }

        function gatherChoices(root) {
            return {
                history: !!(root.querySelector('#opt-history') && root.querySelector('#opt-history').checked),
                expr:    !!(root.querySelector('#opt-expr')    && root.querySelector('#opt-expr').checked),
                canvas:  !!(root.querySelector('#opt-canvas')  && root.querySelector('#opt-canvas').checked),
                format:  (root.querySelector('input[name="export-fmt"]:checked') || {}).value || 'txt'
            };
        }

        function buildTextContent(data, choices) {
            const lines = [];
            lines.push('QUANTUM-NOVA — export');
            lines.push('Date : ' + new Date(data.ts).toLocaleString());
            lines.push('Mode : ' + (data.mode || 'calc'));
            lines.push('');
            if (choices.expr && data.expression) {
                lines.push('— Saisie courante —');
                lines.push(data.expression);
                lines.push('');
            }
            if (choices.history && data.history && data.history.length) {
                lines.push('— Historique des calculs —');
                data.history.forEach(h => {
                    const sep = h.isError ? ' ⚠ ' : ' = ';
                    lines.push(h.expression + sep + h.result);
                });
                lines.push('');
            }
            if (choices.canvas && data.canvasPng) {
                lines.push('— Graphique —');
                lines.push('(image PNG attachée séparément)');
                lines.push('');
            }
            return lines.join('\n');
        }

        function renderPreview(data, choices) {
            const box = document.getElementById('exportPreview');
            if (!box) return;
            box.replaceChildren();
            if (choices.format === 'png' && choices.canvas && data.canvasPng) {
                const img = document.createElement('img');
                img.src = data.canvasPng;
                img.alt = 'Aperçu graphique';
                box.appendChild(img);
                return;
            }
            const pre = document.createElement('pre');
            pre.className = 'export-preview-text';
            pre.textContent = buildTextContent(data, choices);
            box.appendChild(pre);
            if (choices.canvas && data.canvasPng) {
                const img = document.createElement('img');
                img.src = data.canvasPng;
                img.alt = 'Aperçu graphique';
                box.appendChild(img);
            }
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        /**
         * Pour l'option "PDF (impression navigateur)", on construit le HTML
         * à imprimer dans une iframe cachée avec srcdoc (pas de document.write
         * pour rester safe vis-à-vis des recommandations XSS).
         */
        function buildPrintIframe(data, choices) {
            const safeText = buildTextContent(data, choices);
            // Encodage minimal : on construit le DOM dans l'iframe via JS
            // après chargement, plutôt que coller du HTML brut.
            const iframe = document.createElement('iframe');
            iframe.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
            iframe.srcdoc = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>QUANTUM-NOVA Export</title>' +
                '<style>body{font-family:Georgia,serif;padding:30px;color:#000;}pre{font-family:monospace;white-space:pre-wrap;}img{max-width:100%;margin-top:16px;}</style>' +
                '</head><body></body></html>';
            iframe.onload = () => {
                const doc = iframe.contentDocument;
                if (!doc) return;
                const body = doc.body;
                const h1 = doc.createElement('h1'); h1.textContent = 'QUANTUM-NOVA — export';
                body.appendChild(h1);
                const pre = doc.createElement('pre'); pre.textContent = safeText;
                body.appendChild(pre);
                if (choices.canvas && data.canvasPng) {
                    const img = doc.createElement('img');
                    img.src = data.canvasPng;
                    body.appendChild(img);
                }
                setTimeout(() => {
                    iframe.contentWindow.focus();
                    iframe.contentWindow.print();
                    setTimeout(() => iframe.remove(), 1500);
                }, 200);
            };
            document.body.appendChild(iframe);
        }

        function doDownload(data, choices) {
            const stamp = new Date(data.ts).toISOString().replace(/[:.]/g, '-').slice(0, 19);

            if (choices.format === 'png') {
                if (!data.canvasPng) {
                    alert('Aucun graphique disponible.');
                    return;
                }
                fetch(data.canvasPng).then(r => r.blob())
                    .then(b => downloadBlob(b, 'quantum-nova-' + stamp + '.png'));
                return;
            }

            if (choices.format === 'print') {
                buildPrintIframe(data, choices);
                return;
            }

            // Texte par défaut
            const blob = new Blob([buildTextContent(data, choices)], { type: 'text/plain;charset=utf-8' });
            downloadBlob(blob, 'quantum-nova-' + stamp + '.txt');
        }
    })();
    </script>
</body>
</html>
