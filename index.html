<!DOCTYPE html>
<html lang="fr" data-theme="cyber">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM-NOVA V6 — Station de Calcul Modulaire</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- Moteur Mathématique : version 12.4.1 hébergée localement avec SRI.
         La copie CDN est conservée en commentaire pour référence et fallback
         manuel si jamais lib/math.min.js est corrompu. -->
    <script src="lib/math.min.js"
            integrity="sha384-Q3PTxA/UJ8CgmtdkeyhsM/NPwQTzD8MzAvwQW+BI3zc1T8fdGiePP8VN6D4Sxleg"
            crossorigin="anonymous"></script>
    
    <!-- Styles Globaux -->
    <link rel="stylesheet" href="style.css"> <!-- On garde la base CSS V5 pour la cohérence -->
    <link rel="stylesheet" href="core/style-core.css">
    <link rel="stylesheet" href="onboarding.css">
    <link rel="stylesheet" href="apps/matrix/style-matrix.css">
    <link rel="stylesheet" href="apps/algebra/style-algebra.css">
    <link rel="stylesheet" href="apps/calc/style-calc.css">
    <link rel="stylesheet" href="apps/graph/style-graph.css">
    <link rel="stylesheet" href="apps/proba/style-proba.css">
    <link rel="stylesheet" href="apps/help/style-help.css">
</head>
<body class="v6-shell">

    <!-- CONTENEUR PRINCIPAL (L'ÉCRAN DE LA CALCULATRICE) -->
    <div id="app-container" class="workstation">
        
        <!-- HEADER / STATUS BAR -->
        <header class="v6-status-bar">
            <div class="v6-status-left">
                <span class="v6-brand">QUANTUM-NOVA <small>v6.0</small></span>
                <span id="breadcrumb" class="v6-breadcrumb"></span>
            </div>
            <div class="v6-status-right">
                <button id="btn-theme-toggle" class="v6-icon-btn" title="Changer de thème">🌓</button>
                <button id="btn-export-all" class="v6-icon-btn" title="Exporter le travail">📥</button>
                <div id="clock">00:00</div>
            </div>
        </header>

        <!-- ZONE DYNAMIQUE (HOME MENU OU APP ACTIVE) -->
        <main id="view-viewport">
            <!-- Le contenu sera injecté ici par app-manager.js -->
        </main>

        <!-- BARRE D'ACTIONS BASSE (STAY VISIBLE) -->
        <footer class="v6-footer-nav">
            <button id="btn-home" class="v6-nav-btn">
                <span class="icon">🏠</span>
                <span>HOME</span>
            </button>
            <button id="btn-back" class="v6-nav-btn">
                <span class="icon">⬅</span>
                <span>BACK</span>
            </button>
            <button id="btn-help" class="v6-nav-btn">
                <span class="icon">❓</span>
                <span>INFO</span>
            </button>
        </footer>
    </div>

    <!-- TEMPLATES DES APPLICATIONS (Injection rapide sans rechargement) -->
    
    <!-- Template : MENU D'ACCUEIL -->
    <template id="tpl-home">
        <div class="qn-home-menu">
            <header class="qn-home-header">
                <h2>SYSTEM OS v6.0</h2>
                <p>Select application module</p>
            </header>
            <div class="qn-launcher-grid">
                <button class="qn-launch-card" data-app="calc">
                    <span class="icon">🔢</span>
                    <span class="title">Calculus</span>
                </button>
                <button class="qn-launch-card" data-app="graph">
                    <span class="icon">📈</span>
                    <span class="title">Graphing</span>
                </button>
                <button class="qn-launch-card" data-app="matrix">
                    <span class="icon">🔲</span>
                    <span class="title">Matrices</span>
                </button>
                <button class="qn-launch-card" data-app="algebra">
                    <span class="icon">∆</span>
                    <span class="title">Algebra</span>
                </button>
                <button class="qn-launch-card" data-app="proba">
                    <span class="icon">🎲</span>
                    <span class="title">Stats</span>
                </button>
            </div>

            <!-- Exemples rapides -->
            <div class="qn-examples-section" style="margin-top: 30px; border-top: 1px solid var(--v6-border); padding-top: 20px;">
                <span style="font-size: 0.6rem; color: #444; letter-spacing: 2px; text-transform: uppercase;">Quick Launch Samples</span>
                <div id="exampleList" class="qn-example-list" style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;">
                    <!-- Injecté par onboarding.js -->
                </div>
            </div>
        </div>
    </template>

    <!-- Template : APPLICATION MATRICE -->
    <template id="tpl-matrix">
        <div class="app-matrix-container">
            <header class="app-header">
                <h3 style="text-align: center; color: var(--v6-accent); letter-spacing: 2px;">MATRICES</h3>
            </header>

            <!-- Configuration de la matrice A -->
            <section class="matrix-setup">
                <div class="dim-controls">
                    <span>Matrice A :</span>
                    <input type="number" id="matrix-a-rows" value="3" min="1" max="8" inputmode="numeric">
                    <span>x</span>
                    <input type="number" id="matrix-a-cols" value="3" min="1" max="8" inputmode="numeric">
                    <button id="matrix-gen-a" class="btn-gen">GÉNÉRER</button>
                </div>
                <div id="matrix-grid-a" class="matrix-grid-wrapper">
                    <!-- Grille générée ici -->
                </div>
            </section>

            <!-- Configuration de la matrice B -->
            <section class="matrix-setup">
                <div class="dim-controls">
                    <span>Matrice B :</span>
                    <input type="number" id="matrix-b-rows" value="3" min="1" max="8" inputmode="numeric">
                    <span>x</span>
                    <input type="number" id="matrix-b-cols" value="3" min="1" max="8" inputmode="numeric">
                    <button id="matrix-gen-b" class="btn-gen">GÉNÉRER</button>
                </div>
                <div id="matrix-grid-b" class="matrix-grid-wrapper">
                    <!-- Grille générée ici -->
                </div>
            </section>

            <!-- Opérations unaires sur A -->
            <section class="matrix-toolbar">
                <button class="matrix-op-btn" data-op="det" title="Déterminant de A">DET(A)</button>
                <button class="matrix-op-btn" data-op="inv" title="Inverse de A">INV(A)</button>
                <button class="matrix-op-btn" data-op="trans" title="Transposée de A">A&#7488;</button>
                <button class="matrix-op-btn" data-op="trace" title="Trace de A">TR(A)</button>
            </section>

            <!-- Opérations binaires A ∘ B -->
            <section class="matrix-toolbar">
                <button class="matrix-op-btn" data-op="add" title="Somme A+B">A + B</button>
                <button class="matrix-op-btn" data-op="sub" title="Différence A-B">A − B</button>
                <button class="matrix-op-btn" data-op="mul" title="Produit matriciel A×B">A × B</button>
            </section>

            <!-- Pivot de Gauss : RREF + résolution de systèmes linéaires -->
            <section class="matrix-toolbar matrix-gauss-toolbar">
                <button class="matrix-op-btn" data-op="rref" title="Forme échelonnée réduite de A">RREF(A)</button>
                <button class="matrix-op-btn" data-op="solve" title="Résout le système : A est traitée comme [M | b], dernière colonne = second membre">RÉSOUDRE A·x = b</button>
                <label class="matrix-gauss-toggle">
                    <input type="checkbox" id="matrix-show-steps" checked>
                    <span>Afficher les étapes</span>
                </label>
            </section>

            <!-- Zone de résultat -->
            <section id="matrix-result-output">
                <div class="placeholder">En attente de calcul...</div>
            </section>
        </div>
    </template>

    <!-- Template : APPLICATION ALGÈBRE (Calcul formel) -->
    <template id="tpl-algebra">
        <div class="app-algebra-container">
            <header class="app-header">
                <h3 style="text-align: center; color: var(--v6-accent); letter-spacing: 2px;">ALGÈBRE SYMBOLIQUE</h3>
            </header>

            <div class="algebra-input-group">
                <input type="text" id="algebra-input" class="algebra-field" placeholder="Ex: x^2 + 2x + 1" autofocus>
                
                <div class="algebra-controls">
                    <select id="algebra-mode">
                        <option value="derive">DÉRIVER (d/dx)</option>
                        <option value="simplify">SIMPLIFIER</option>
                        <option value="rationalize">FORME RATIONNELLE</option>
                        <option value="eval">ÉVALUER</option>
                    </select>
                    <button id="algebra-execute">CALCULER</button>
                </div>
            </div>

            <div class="algebra-tools">
                <button class="algebra-quick-fn" data-fn="sin">sin(x)</button>
                <button class="algebra-quick-fn" data-fn="cos">cos(x)</button>
                <button class="algebra-quick-fn" data-fn="log">log(x)</button>
                <button class="algebra-quick-fn" data-fn="sqrt">sqrt(x)</button>
                <button class="algebra-quick-fn" data-fn="exp">exp(x)</button>
                <button class="algebra-quick-fn" data-fn="abs">abs(x)</button>
            </div>

            <div id="algebra-result-display">
                <div class="placeholder" style="text-align: center; opacity: 0.5; font-size: 0.8rem;">
                    Entrez une expression pour commencer.
                </div>
            </div>
        </div>
    </template>

    <!-- Template : APPLICATION CALCUL STANDARD -->
    <template id="tpl-calc">
        <div class="app-calc-container">
            <section class="calc-screen-module">
                <div id="calc-history-list"></div>
                <input type="text" id="calc-display" class="qn-copyable" value="0" readonly title="Cliquer pour copier le résultat">
            </section>

            <section class="calc-keyboard">
                <!-- Ligne 1 -->
                <button class="calc-btn action" data-action="clear">AC</button>
                <button class="calc-btn action" data-action="backspace">DEL</button>
                <button class="calc-btn op" data-val="^">^</button>
                <button class="calc-btn op" data-val="/">÷</button>

                <!-- Ligne 2 -->
                <button class="calc-btn" data-val="7">7</button>
                <button class="calc-btn" data-val="8">8</button>
                <button class="calc-btn" data-val="9">9</button>
                <button class="calc-btn op" data-val="*">×</button>

                <!-- Ligne 3 -->
                <button class="calc-btn" data-val="4">4</button>
                <button class="calc-btn" data-val="5">5</button>
                <button class="calc-btn" data-val="6">6</button>
                <button class="calc-btn op" data-val="-">−</button>

                <!-- Ligne 4 -->
                <button class="calc-btn" data-val="1">1</button>
                <button class="calc-btn" data-val="2">2</button>
                <button class="calc-btn" data-val="3">3</button>
                <button class="calc-btn op" data-val="+">+</button>

                <!-- Ligne 5 -->
                <button class="calc-btn" data-val="0">0</button>
                <button class="calc-btn" data-val=".">.</button>
                <button class="calc-btn action" data-action="ans">ANS</button>
                <button class="calc-btn equals" data-action="evaluate">=</button>
            </section>
        </div>
    </template>

    <!-- Template : APPLICATION GRAPHEUR (Moteur V5) -->
    <template id="tpl-graph">
        <div class="app-graph-container">
            <!-- Zone Graphe -->
            <div id="canvasContainer">
                <canvas id="mathCanvas"></canvas>
                <div id="led" class="led"></div>
                <div id="statusText" class="status-text">PRÊT</div>
            </div>

            <!-- Contrôles et Saisie -->
            <section class="graph-controls">
                <div class="graph-info-bar">
                    <span id="coordsText">X: 0.00 | Y: 0.00</span>
                    <div class="graph-btns">
                        <button id="angleModeBtn" class="g-btn" onclick="toggleAngleMode()">RAD</button>
                        <button class="g-btn" onclick="resetVue()">⌂ VUE</button>
                        <button class="g-btn" onclick="effacerGraphe()">🗑 VIDER</button>
                    </div>
                </div>
                
                <div class="graph-input-row">
                    <input type="text" id="screen" placeholder="f(x)=sin(x)" autofocus>
                </div>
                
                <div id="historyLog" class="graph-log"></div>
            </section>

            <!-- Légende cachée par défaut mais accessible par ui.js -->
            <div id="functionLegend" style="display: none;"></div>
        </div>
    </template>

    <!-- Template : APPLICATION STATS / PROBA -->
    <template id="tpl-proba">
        <div class="app-proba-container">
            <header class="app-header">
                <h3 style="text-align: center; color: var(--v6-accent); letter-spacing: 2px;">STATS & PROBABILITÉS</h3>
            </header>

            <!-- Section Stats Descriptives -->
            <section class="proba-section">
                <h4>📊 Statistiques Descriptives</h4>
                <div class="proba-input-row">
                    <input type="text" id="proba-stats-input" class="proba-field" placeholder="Série: 12, 15, 10, 19...">
                    <button id="proba-calc-stats" class="proba-btn">CALCULER</button>
                </div>
                <div id="proba-res-stats">
                    <div class="placeholder" style="font-size: 0.7rem; opacity: 0.5;">Entrez des nombres séparés par des virgules.</div>
                </div>
            </section>

            <!-- Section Combinatoire -->
            <section class="proba-section">
                <h4>🎲 Combinatoire (n, k)</h4>
                <div class="proba-input-row">
                    <input type="number" id="proba-n" class="proba-field short" placeholder="n" value="10" inputmode="numeric">
                    <input type="number" id="proba-k" class="proba-field short" placeholder="k" value="2" inputmode="numeric">
                    <button id="proba-calc-comb" class="proba-btn">COMBINATOIRE</button>
                </div>
                <div id="proba-res-comb">
                    <div class="placeholder" style="font-size: 0.7rem; opacity: 0.5;">Calcule n!, nCr et nPr.</div>
                </div>
            </section>

            <!-- Section Loi Binomiale -->
            <section class="proba-section">
                <h4>📐 Loi Binomiale B(n, p)</h4>
                <div class="proba-input-row">
                    <input type="number" id="proba-bin-n" class="proba-field short" placeholder="n" value="10" inputmode="numeric">
                    <input type="number" id="proba-bin-k" class="proba-field short" placeholder="k" value="3" inputmode="numeric">
                    <input type="number" id="proba-bin-p" class="proba-field short" placeholder="p" value="0.5" step="0.01" min="0" max="1" inputmode="decimal">
                    <button id="proba-calc-bin" class="proba-btn">CALCULER</button>
                </div>
                <div id="proba-res-bin">
                    <div class="placeholder" style="font-size: 0.7rem; opacity: 0.5;">P(X=k), P(X≤k), espérance, variance.</div>
                </div>
            </section>

            <!-- Section Loi Normale (densité) -->
            <section class="proba-section">
                <h4>🔔 Loi Normale N(μ, σ)</h4>
                <div class="proba-input-row">
                    <input type="number" id="proba-norm-mu" class="proba-field short" placeholder="μ" value="0" step="0.1" inputmode="decimal">
                    <input type="number" id="proba-norm-sigma" class="proba-field short" placeholder="σ" value="1" step="0.1" min="0.0001" inputmode="decimal">
                    <input type="number" id="proba-norm-x" class="proba-field short" placeholder="x" value="1" step="0.1" inputmode="decimal">
                    <button id="proba-calc-norm" class="proba-btn">CALCULER</button>
                </div>
                <div id="proba-res-norm">
                    <div class="placeholder" style="font-size: 0.7rem; opacity: 0.5;">Densité f(x) et P(X≤x) au point x.</div>
                </div>
            </section>
        </div>
    </template>

    <!-- Template : CENTRE D'AIDE (Manuel V6) -->
    <template id="tpl-help">
        <div class="app-help-container">
            <header class="help-hero">
                <h3>MANUEL SYSTÈME</h3>
                <p>QUANTUM-NOVA OS v6.0</p>
            </header>

            <!-- Navigation Rapide -->
            <section class="help-section">
                <h4>🚀 Pour Commencer</h4>
                <div class="help-card">
                    <p>QUANTUM-NOVA est une suite logicielle modulaire. Utilisez le menu principal pour basculer entre les outils de calcul, de traçage et d'analyse.</p>
                </div>
            </section>

            <!-- Calculatus -->
            <section class="help-section">
                <h4>🔢 Calcul Standard</h4>
                <div class="help-grid">
                    <div class="help-card">
                        <strong>Expressions Mixtes</strong>
                        <p>Supporte les unités et les constantes complexes.</p>
                        <div class="help-example-box"><code>2 + sin(45 deg) * 5</code></div>
                    </div>
                    <div class="help-card">
                        <strong>Mémoire (ANS)</strong>
                        <p>Utilisez la touche ANS pour rappeler le dernier résultat calculé.</p>
                    </div>
                </div>
            </section>

            <!-- Grapheur -->
            <section class="help-section">
                <h4>📈 Grapheur Interactif</h4>
                <div class="help-grid">
                    <div class="help-card">
                        <strong>Fonctions y = f(x)</strong>
                        <p>Définissez une fonction pour la tracer immédiatement.</p>
                        <div class="help-example-box"><code>f(x) = x^2 - 3</code></div>
                    </div>
                    <div class="help-card">
                        <strong>Équations Implicites</strong>
                        <p>Tracez des cercles ou des formes complexes.</p>
                        <div class="help-example-box"><code>x^2 + y^2 = 25</code></div>
                    </div>
                </div>
            </section>

            <!-- Matrices -->
            <section class="help-section">
                <h4>🔲 Calcul Matriciel</h4>
                <div class="help-grid">
                    <div class="help-card">
                        <strong>Grille Dynamique</strong>
                        <p>Choisissez les dimensions de A et de B, cliquez sur GÉNÉRER, puis remplissez les cases. La virgule décimale est acceptée.</p>
                    </div>
                    <div class="help-card">
                        <strong>Opérations sur A</strong>
                        <p>DET(A), INV(A), Aᵀ et TR(A). Déterminant et inverse exigent une matrice carrée.</p>
                    </div>
                    <div class="help-card">
                        <strong>Opérations binaires</strong>
                        <p>A+B et A−B exigent les mêmes dimensions ; A×B exige cols(A) = lignes(B).</p>
                    </div>
                    <div class="help-card">
                        <strong>Pivot de Gauss</strong>
                        <p><strong>RREF(A)</strong> calcule la forme échelonnée réduite de A. Utile pour le rang, l'indépendance des colonnes, ou comme étape vers l'inverse.</p>
                    </div>
                    <div class="help-card">
                        <strong>Résolution A·x = b</strong>
                        <p>Saisissez la matrice augmentée [M | b] dans A : la <em>dernière colonne</em> est le second membre. Le bouton <strong>RÉSOUDRE</strong> applique l'élimination de Gauss-Jordan et conclut : solution unique, infinité, ou aucune.</p>
                        <div class="help-example-box">Système 3x + 2y = 7 et x − y = 1<br>→ A = 2×3 :<br>3, 2, 7<br>1, −1, 1</div>
                    </div>
                    <div class="help-card">
                        <strong>Étapes pédagogiques</strong>
                        <p>La case <em>« Afficher les étapes »</em> trace chaque opération élémentaire (échange Lᵢ↔Lⱼ, normalisation, élimination) — pratique pour suivre l'algorithme à la main.</p>
                    </div>
                </div>
            </section>

            <!-- Algèbre -->
            <section class="help-section">
                <h4>∆ Algèbre & Formel</h4>
                <div class="help-grid">
                    <div class="help-card">
                        <strong>Dérivées Symboliques</strong>
                        <p>Calcule la dérivée exacte de l'expression fournie.</p>
                        <div class="help-example-box"><code>derivative(x^3, x)</code> → 3 * x^2</div>
                    </div>
                    <div class="help-card">
                        <strong>Simplification</strong>
                        <p>Réduit les expressions mathématiques complexes.</p>
                        <div class="help-example-box"><code>2x + 5x + 3</code> → 7x + 3</div>
                    </div>
                </div>
            </section>

            <!-- Stats -->
            <section class="help-section">
                <h4>🎲 Statistiques</h4>
                <div class="help-grid">
                    <div class="help-card">
                        <strong>Séries de données</strong>
                        <p>Saisissez vos nombres séparés par des virgules ou des espaces.</p>
                        <div class="help-example-box"><code>10, 12, 12, 15, 8</code></div>
                    </div>
                </div>
            </section>

            <footer class="help-footer">
                DESIGNED BY BATATRAX & GEMINI EXPERT GO<br>
                SANCTUAIRE TECH © 2026
            </footer>
        </div>
    </template>

    <!-- Logic Core -->
    <script src="core/ui-core.js"></script>
    <script src="engine.js"></script> <!-- Moteur V5 -->
    <script src="ui.js"></script>     <!-- UI V5 -->
    <script src="onboarding.js"></script>
    <script src="core/app-manager.js"></script>
    <script src="apps/matrix/app-matrix.js"></script>
    <script src="apps/algebra/app-algebra.js"></script>
    <script src="apps/calc/app-calc.js"></script>
    <script src="apps/graph/app-graph.js"></script>
    <script src="apps/proba/app-proba.js"></script>
</body>
</html>
